    - {match: 90, winners_of: [74, 77]}
    - {match: 91, winners_of: [76, 78]}
    - {match: 92, winners_of: [79, 80]}
    - {match: 93, winners_of: [83, 84]}
    - {match: 94, winners_of: [81, 82]}
    - {match: 95, winners_of: [86, 88]}
    - {match: 96, winners_of: [85, 87]}
  quarterfinals:
