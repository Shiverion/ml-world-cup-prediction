    - {match: 98, winners_of: [93, 94]}
    - {match: 99, winners_of: [91, 92]}
    - {match: 100, winners_of: [95, 96]}
  semifinals:
    - {match: 101, winners_of: [97, 98]}
    - {match: 102, winners_of: [99, 100]}
  final:
